<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RequestHub · New Request</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>New Request</h1>

        <form id="requestForm">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" placeholder="e.g. Access to Projects folder" required>
            </div>

            <div class="form-group">
                <label for="department">Department</label>
                <input type="text" id="department" placeholder="e.g. IT, HR, Accounting">
            </div>

            <div class="form-group">
                <label for="resource">Resource</label>
                <input type="text" id="resource" placeholder="e.g. /projects or Jira" required>
            </div>

            <div class="form-group">
                <label for="accessType">Access Type</label>
                <select id="accessType">
                    <option value="Read">Read</option>
                    <option value="Write">Write</option>
                    <option value="Full">Full</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>

            <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                </select>
            </div>

            <div class="form-group">
                <label for="justification">Justification</label>
                <textarea id="justification" rows="3" placeholder="Why do you need this access?"></textarea>
            </div>

            <div class="form-group">
                <label for="expiryDate">Expiry Date (optional)</label>
                <input type="date" id="expiryDate">
            </div>

            <div class="form-group">
                <label for="basis">Basis (HR ticket / document)</label>
                <input type="text" id="basis" placeholder="e.g. HR-123">
            </div>

            <div class="top-bar">
                <button type="button" id="cancelBtn" class="btn-danger">Cancel</button>
                <button type="submit">Create Request</button>
            </div>

            <div class="message" id="message"></div>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
