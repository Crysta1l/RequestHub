<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RequestHub · Create Request</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>New Access Request</h1>
        <form id="requestForm">
            <div>
                <label for="title">Title</label>
                <input type="text" id="title" required>
            </div>
            <div>
                <label for="resource">Resource</label>
                <input type="text" id="resource" required>
            </div>
            <div>
                <label for="accessType">Access Type</label>
                <select id="accessType">
                    <option value="Read">Read</option>
                    <option value="Write">Write</option>
                    <option value="Full">Full</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <div>
                <label for="justification">Justification</label>
                <textarea id="justification" rows="3"></textarea>
            </div>
            <div>
                <label for="basis">Basis (HR ticket / document)</label>
                <input type="text" id="basis" placeholder="e.g., HR-123">
            </div>
            <button type="submit">Submit Request</button>
            <button type="button" id="cancelBtn">Cancel</button>
            <div id="message"></div>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
