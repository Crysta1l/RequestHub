<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RequestHub · Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container container-sm">
        <h1>RequestHub</h1>

        <form id="authForm" onsubmit="return false;">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="message" id="authMessage"></div>

            <button type="button" id="loginBtn" class="btn-full">Login</button>
            <button type="button" id="registerBtn" class="btn-full btn-ghost">Create Account</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
