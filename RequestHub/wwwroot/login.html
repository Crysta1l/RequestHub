<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RequestHub · Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>RequestHub</h1>
        <div class="card">
            <form id="loginForm" onsubmit="return false;">
                <h2>Login</h2>
                <input type="email" id="loginEmail" placeholder="Email" value="qwe@mail.ru">
                <input type="password" id="loginPassword" placeholder="Password" value="">
                <button id="loginBtn">Login</button>
                <p id="loginMessage" class="message"></p>
            </form>
            <hr>
            <button id="showRegBtn" class="secondary">Create account</button>
            <form id="regForm" style="display:none;" onsubmit="return false;">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Password">
                <button id="registerBtn">Register</button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
