<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RequestHub · Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>RequestHub</h1>
        <div class="card">
            <input type="email" id="email" placeholder="Email" value="">
            <input type="password" id="password" placeholder="Password" value="">
            <button id="loginBtn">Login</button>
            <div id="message"></div>
            <hr>
            <button id="showRegBtn" class="secondary">Create account</button>
            <div id="regForm" style="display:none; margin-top: 1rem;">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Password">
                <button id="doRegBtn">Register</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
