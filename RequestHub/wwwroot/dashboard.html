<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RequestHub · Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>RequestHub</h1>

        <div class="top-bar">
            <button id="newRequestBtn">+ New Request</button>
            <button id="adminBtn" style="display:none;">Admin Panel</button>
            <button id="reportBtn">⬇ Download Report</button>
            <div class="notification-bell" id="notificationBell">
                 <span id="notifCount" class="notif-badge" style="display:none;">0</span>
                <div id="notifDropdown" class="notif-dropdown" style="display:none;"></div>
            </div>
            <button id="logoutBtn" class="btn-danger">Logout</button>
        </div>

        <div id="statsBar" class="stats-bar"></div>

        <h2>My Requests</h2>
        <div class="filter-bar">
            <input type="text" id="filterTitle" placeholder="Search by title...">
            <input type="text" id="filterResource" placeholder="Filter by resource...">
            <select id="filterStatus">
                <option value="">All statuses</option>
                <option value="Draft">Draft</option>
                <option value="Submitted">Submitted</option>
                <option value="InApproval">InApproval</option>
                <option value="Approved">Approved</option>
                <option value="Rejected">Rejected</option>
            </select>
        </div>
        <div id="myRequestsList"></div>

        <h2>Pending Approval</h2>
        <div id="pendingList"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
