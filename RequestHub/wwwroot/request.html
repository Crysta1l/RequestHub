<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RequestHub · Request Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Request Details</h1>

        <div id="requestInfo" class="detail-grid"></div>

        <div id="approvalSection"></div>

        <h2>Files</h2>
        <div id="filesList"></div>
        <div class="form-group" style="margin-top: 1rem;">
            <label for="fileInput">Attach File</label>
            <input type="file" id="fileInput">
            <button id="uploadBtn" class="btn-sm" style="margin-top: 0.5rem;">Upload</button>
        </div>

        <h2>History</h2>
        <div id="historyList"></div>

        <div class="top-bar" style="margin-top: 2rem;">
            <button id="backBtn">← Back to Dashboard</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
