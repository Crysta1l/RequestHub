<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RequestHub · Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Admin Panel</h1>

        <div class="top-bar">
            <button id="backBtn">← Back to Dashboard</button>
        </div>

        <h2>Users</h2>
        <div class="filter-bar">
            <input type="text" id="filterEmail" placeholder="Search by email...">
        </div>
        <div id="usersList"></div>

        <h2>Audit Log</h2>
        <div class="filter-bar">
            <input type="text" id="filterAuditEmail" placeholder="Filter by email...">
            <select id="filterAction">
                <option value="">All actions</option>
                <option value="Login">Login</option>
                <option value="Logout">Logout</option>
            </select>
        </div>
        <div id="auditList"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
